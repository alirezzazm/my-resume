<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1635"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="900" cy="180" r="220" fill="#7c3aed" opacity="0.18"/>
  <circle cx="200" cy="500" r="240" fill="#06b6d4" opacity="0.14"/>

  <!-- Code editor mockup -->
  <g transform="translate(720 130)">
    <rect width="380" height="320" rx="14" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <rect x="0" y="0" width="380" height="32" rx="14" fill="#21262d"/>
    <circle cx="18" cy="16" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="16" r="5" fill="#febc2e"/>
    <circle cx="54" cy="16" r="5" fill="#28c840"/>
    <text x="22" y="80" font-family="JetBrains Mono, monospace" font-size="14" fill="#8b949e">// Senior .NET Developer</text>
    <text x="22" y="115" font-family="JetBrains Mono, monospace" font-size="15" fill="#ff7b72">public class</text>
    <text x="155" y="115" font-family="JetBrains Mono, monospace" font-size="15" fill="#d2a8ff">Alireza</text>
    <text x="22" y="150" font-family="JetBrains Mono, monospace" font-size="15" fill="#c9d1d9">{'{'}</text>
    <text x="44" y="180" font-family="JetBrains Mono, monospace" font-size="14" fill="#79c0ff">stack</text>
    <text x="100" y="180" font-family="JetBrains Mono, monospace" font-size="14" fill="#c9d1d9">{'=>'}</text>
    <text x="135" y="180" font-family="JetBrains Mono, monospace" font-size="14" fill="#a5d6ff">".NET, MAUI"</text>
    <text x="44" y="210" font-family="JetBrains Mono, monospace" font-size="14" fill="#79c0ff">years</text>
    <text x="100" y="210" font-family="JetBrains Mono, monospace" font-size="14" fill="#c9d1d9">{'=>'}</text>
    <text x="135" y="210" font-family="JetBrains Mono, monospace" font-size="14" fill="#f78166">8</text>
    <text x="44" y="240" font-family="JetBrains Mono, monospace" font-size="14" fill="#79c0ff">build</text>
    <text x="100" y="240" font-family="JetBrains Mono, monospace" font-size="14" fill="#c9d1d9">{'=>'}</text>
    <text x="135" y="240" font-family="JetBrains Mono, monospace" font-size="14" fill="#a5d6ff">"🚀"</text>
    <text x="22" y="280" font-family="JetBrains Mono, monospace" font-size="15" fill="#c9d1d9">{'}'}</text>
  </g>

  <!-- Title -->
  <text x="80" y="240" font-family="Inter, sans-serif" font-weight="800" font-size="68" fill="white">Alireza Zamani</text>
  <text x="80" y="320" font-family="JetBrains Mono, monospace" font-weight="600" font-size="32" fill="url(#accent)">.NET · Full-Stack · Mobile</text>
  <text x="80" y="380" font-family="Inter, sans-serif" font-size="22" fill="#94a3b8">Microservices · Blazor · MAUI · React Native</text>

  <!-- Tags -->
  <g transform="translate(80 460)">
    <rect width="80" height="32" rx="16" fill="#7c3aed" opacity="0.25"/>
    <text x="40" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="600" font-size="14" fill="#a78bfa">C#</text>

    <rect x="92" width="100" height="32" rx="16" fill="#7c3aed" opacity="0.25"/>
    <text x="142" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="600" font-size="14" fill="#a78bfa">.NET 8</text>

    <rect x="204" width="120" height="32" rx="16" fill="#7c3aed" opacity="0.25"/>
    <text x="264" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="600" font-size="14" fill="#a78bfa">Microservices</text>

    <rect x="336" width="80" height="32" rx="16" fill="#7c3aed" opacity="0.25"/>
    <text x="376" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="600" font-size="14" fill="#a78bfa">MAUI</text>
  </g>
</svg>
