<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#fff" fill-opacity="0.10"/>
    </pattern>
    <linearGradient id="shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.45" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.45"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#dots)"/>
  <circle cx="650" cy="110" r="260" fill="url(#glow)"/>
  <circle cx="120" cy="430" r="220" fill="url(#glow)" opacity="0.6"/>
  <rect width="800" height="450" fill="url(#shade)"/>

  <!-- emblem -->
  <g transform="translate(660 150)">
    <circle r="70" fill="#fff" fill-opacity="0.10"/>
    <circle r="70" fill="none" stroke="#fff" stroke-opacity="0.35" stroke-width="1.5"/>
    <g transform="scale(1.05)"><g fill="#fff"><rect x="-26" y="-26" width="18" height="18" rx="4"/><rect x="-26" y="0" width="18" height="18" rx="4"/><rect x="-26" y="26" width="18" height="18" rx="4"/><rect x="0" y="-26" width="18" height="18" rx="4"/><rect x="0" y="0" width="18" height="18" rx="4"/><rect x="0" y="26" width="18" height="18" rx="4"/><rect x="26" y="-26" width="18" height="18" rx="4"/><rect x="26" y="0" width="18" height="18" rx="4"/><rect x="26" y="26" width="18" height="18" rx="4"/></g></g>
  </g>

  <!-- category -->
  <text x="56" y="210" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="18" letter-spacing="3" fill="#fff" fill-opacity="0.85">MICROSERVICES</text>
  <!-- title -->
  <text x="54" y="285" font-family="Segoe UI,Arial,Helvetica,sans-serif" font-size="66" font-weight="800" fill="#fff">Online Store</text>
  <rect x="56" y="316" width="70" height="6" rx="3" fill="#fff" fill-opacity="0.9"/>

  <g transform="translate(56 372)">
    <rect width="62" height="34" rx="17" fill="#000" fill-opacity="0.28"/>
    <rect width="62" height="34" rx="17" fill="none" stroke="#fff" stroke-opacity="0.35"/>
    <text x="31" y="22" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="15" fill="#fff" fill-opacity="0.95">.NET</text>
  </g><g transform="translate(130 372)">
    <rect width="81" height="34" rx="17" fill="#000" fill-opacity="0.28"/>
    <rect width="81" height="34" rx="17" fill="none" stroke="#fff" stroke-opacity="0.35"/>
    <text x="40.5" y="22" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="15" fill="#fff" fill-opacity="0.95">Docker</text>
  </g><g transform="translate(223 372)">
    <rect width="71.5" height="34" rx="17" fill="#000" fill-opacity="0.28"/>
    <rect width="71.5" height="34" rx="17" fill="none" stroke="#fff" stroke-opacity="0.35"/>
    <text x="35.75" y="22" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="15" fill="#fff" fill-opacity="0.95">Redis</text>
  </g>
</svg>